# Dev-only override: expose Postgres on the host so you can inspect the same
# data locally (psql / GUI). Never shipped to the VPS — production keeps the DB
# reachable only on the internal network.
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  db:
    ports:
      - "127.0.0.1:5433:5432"